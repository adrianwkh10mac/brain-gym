<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FDF6EC">
  <meta name="description" content="15 合 1 游戏合集：数独、数织、皇后谜题、贪吃蛇、太空战机、水果消消乐……无限关卡，越玩越聪明">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>大脑体操馆</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- 主页 -->
    <section id="screen-home" class="screen active">
      <header class="home-header">
        <button id="btn-settings" class="icon-btn settings-btn">⚙️</button>
        <div class="home-mascot">
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="mascotShade" cx="0.35" cy="0.3" r="0.9">
                <stop offset="0" stop-color="#F3E3FF"/>
                <stop offset="1" stop-color="#D9C7F5"/>
              </radialGradient>
            </defs>
            <ellipse cx="256" cy="440" rx="120" ry="16" fill="#000000" opacity="0.07"/>
            <g fill="url(#mascotShade)">
              <circle cx="256" cy="270" r="150"/>
              <circle cx="150" cy="220" r="62"/>
              <circle cx="210" cy="150" r="58"/>
              <circle cx="300" cy="145" r="62"/>
              <circle cx="365" cy="205" r="60"/>
              <circle cx="130" cy="290" r="48"/>
              <circle cx="382" cy="280" r="48"/>
            </g>
            <path d="M 256 130 Q 240 175 256 220 Q 270 260 250 300" stroke="#B79EE8" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.55"/>
            <path d="M 175 175 Q 195 205 185 240" stroke="#B79EE8" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.4"/>
            <path d="M 335 175 Q 315 205 325 240" stroke="#B79EE8" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.4"/>
            <path d="M 108 205 Q 256 152 404 205 L 404 240 Q 256 190 108 240 Z" fill="#7DDBC0"/>
            <rect x="238" y="196" width="36" height="46" rx="10" fill="#4CC4A3"/>
            <g class="blink">
              <ellipse cx="196" cy="300" rx="16" ry="18" fill="#5B4A56"/>
              <ellipse cx="316" cy="300" rx="16" ry="18" fill="#5B4A56"/>
              <circle cx="190" cy="293" r="5.5" fill="#FFFFFF"/>
              <circle cx="310" cy="293" r="5.5" fill="#FFFFFF"/>
            </g>
            <ellipse cx="160" cy="326" rx="20" ry="12" fill="#FFB3C6" opacity="0.75"/>
            <ellipse cx="352" cy="326" rx="20" ry="12" fill="#FFB3C6" opacity="0.75"/>
            <path d="M 226 318 Q 256 344 286 318" stroke="#5B4A56" stroke-width="8" fill="none" stroke-linecap="round"/>
            <g transform="translate(358,352) rotate(-18)">
              <rect x="-46" y="-8" width="92" height="16" rx="8" fill="#F783AC"/>
              <rect x="-58" y="-20" width="20" height="40" rx="8" fill="#F9A8C4"/>
              <rect x="38" y="-20" width="20" height="40" rx="8" fill="#F9A8C4"/>
            </g>
          </svg>
        </div>
        <h1 class="home-title">大脑体操馆</h1>
        <p class="home-sub">每天练一练，脑子转得快</p>
      </header>
      <div id="home-stats" class="home-stats"></div>
      <div id="game-sections" class="game-sections"></div>
      <p class="home-foot">15 个游戏 · 无限关卡 · 离线可玩 · 成绩自动保存</p>
    </section>

    <!-- 游戏页 -->
    <section id="screen-play" class="screen">
      <header class="play-header">
        <button id="btn-back" class="icon-btn">←</button>
        <div class="play-title-box">
          <span id="play-title" class="play-title"></span>
          <span id="play-sub" class="play-sub"></span>
        </div>
        <div id="play-timer" class="play-timer">0:00</div>
      </header>
      <div id="rest-bar" class="rest-bar">
        <span class="rest-bar-icon">👁️</span>
        <div class="rest-bar-track"><div id="rest-bar-fill" class="rest-bar-fill"></div></div>
        <span id="rest-bar-text" class="rest-bar-text"></span>
      </div>
      <div id="play-info" class="play-info"></div>
      <div id="game-host" class="game-host"></div>
    </section>

    <!-- 模式/难度选择弹层 -->
    <div id="overlay-mode" class="overlay">
      <div class="panel">
        <div id="mode-icon" class="mode-icon"></div>
        <h2 id="mode-title"></h2>
        <p id="mode-desc" class="mode-desc"></p>
        <div class="mode-section">
          <h3>🎯 练习模式 <small>选个难度随便玩</small></h3>
          <div id="mode-practice" class="mode-btns"></div>
        </div>
        <div class="mode-section">
          <h3>🏔️ 闯关模式 <small>主线 50 关有 Boss 有大结局，通关后无限模式</small></h3>
          <div id="mode-challenge" class="mode-btns"></div>
        </div>
        <button id="btn-mode-close" class="btn btn-ghost">返回</button>
      </div>
    </div>

    <!-- 胜利/失败结算弹层 -->
    <div id="overlay-result" class="overlay">
      <div class="panel">
        <h2 id="result-title"></h2>
        <div id="result-stats" class="result-stats"></div>
        <p id="result-record" class="result-record"></p>
        <div class="result-btns">
          <button id="btn-result-main" class="btn btn-big"></button>
          <button id="btn-result-home" class="btn btn-ghost">回主页</button>
        </div>
      </div>
    </div>

    <!-- 设置弹层 -->
    <div id="overlay-settings" class="overlay">
      <div class="panel">
        <h2>⚙️ 设置</h2>
        <div class="mode-section">
          <h3>🎨 主题外观 <small>护眼模式减少蓝光</small></h3>
          <div id="theme-btns" class="mode-btns theme-grid">
            <button class="btn theme-btn" data-theme="light"><span class="theme-dot dot-light"></span>标准</button>
            <button class="btn theme-btn" data-theme="warm"><span class="theme-dot dot-warm"></span>护眼</button>
            <button class="btn theme-btn" data-theme="dark"><span class="theme-dot dot-dark"></span>夜间</button>
          </div>
        </div>
        <div class="mode-section">
          <h3>👁️ 休息提醒 <small>每玩 20 分钟提醒休息一下</small></h3>
          <button id="btn-rest-toggle" class="btn diff-btn rest-toggle"></button>
        </div>
        <div class="mode-section">
          <h3>📋 游玩记录 <small>家长可以看到什么时候玩的、玩了多久</small></h3>
          <button id="btn-log-open" class="btn diff-btn">查看游玩记录</button>
        </div>
        <div class="mode-section">
          <h3>🗂️ 数据</h3>
          <button id="btn-reset-save" class="btn diff-btn danger-btn">清空所有纪录（含游玩记录）</button>
        </div>
        <button id="btn-settings-close" class="btn btn-ghost">关闭</button>
        <p id="settings-version" class="settings-version"></p>
      </div>
    </div>

    <!-- 游玩记录弹层 -->
    <div id="overlay-log" class="overlay overlay-top">
      <div class="panel log-panel">
        <h2>📋 游玩记录</h2>
        <p id="log-summary" class="log-summary"></p>
        <div id="log-list" class="log-list"></div>
        <button id="btn-log-close" class="btn btn-ghost">关闭</button>
      </div>
    </div>

    <!-- 护眼休息弹层 -->
    <div id="overlay-rest-eye" class="overlay overlay-top">
      <div class="panel rest-panel">
        <div class="rest-emoji">🌳</div>
        <h2>眼睛休息时间</h2>
        <p class="mode-desc">已经连续玩了 20 分钟啦！<br>看看 6 米以外的远处，眨眨眼睛，<br>让眼睛放松一下～</p>
        <div id="rest-count" class="rest-count">20</div>
        <button id="btn-rest-done" class="btn btn-big" style="display:none">休息好了，继续！</button>
        <button id="btn-rest-skip" class="btn btn-ghost">跳过（不推荐哦）</button>
      </div>
    </div>

    <div id="confetti-layer"></div>
  </div>

  <script src="js/version.js"></script>
  <script src="js/core.js"></script>
  <script src="js/gen.js"></script>
  <script src="js/games/schulte.js"></script>
  <script src="js/games/eagle.js"></script>
  <script src="js/games/memory.js"></script>
  <script src="js/games/slide.js"></script>
  <script src="js/games/maze.js"></script>
  <script src="js/games/sudoku.js"></script>
  <script src="js/games/nonogram.js"></script>
  <script src="js/games/flow.js"></script>
  <script src="js/games/queens.js"></script>
  <script src="js/games/snake.js"></script>
  <script src="js/games/racer.js"></script>
  <script src="js/games/shooter.js"></script>
  <script src="js/games/jump.js"></script>
  <script src="js/games/fruit.js"></script>
  <script src="js/games/match3.js"></script>
  <script src="js/boot.js"></script>
</body>
</html>
